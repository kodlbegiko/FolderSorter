name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Run tests
        run: swift test
      - name: Run Python tests
        run: PYTHONPATH=python python3 -m unittest discover -s python_tests
      - name: Build GUI and CLI
        run: swift build
      - name: Build pip package
        run: |
          python3 -m venv /tmp/foldersorter-package-venv
          /tmp/foldersorter-package-venv/bin/python -m pip install --upgrade pip build twine
          /tmp/foldersorter-package-venv/bin/python -m build
          /tmp/foldersorter-package-venv/bin/python -m twine check dist/*
      - name: Test pip wheel CLI
        run: |
          python3 -m venv /tmp/foldersorter-wheel-venv
          /tmp/foldersorter-wheel-venv/bin/python -m pip install dist/foldersorter-*.whl
          /tmp/foldersorter-wheel-venv/bin/foldersorter --help
          mkdir -p /tmp/foldersorter-fixture/input /tmp/foldersorter-fixture/output
          printf "image" > /tmp/foldersorter-fixture/input/photo.jpg
          printf "movie" > /tmp/foldersorter-fixture/input/clip.mp4
          /tmp/foldersorter-wheel-venv/bin/foldersorter \
            --input /tmp/foldersorter-fixture/input \
            --output /tmp/foldersorter-fixture/output
